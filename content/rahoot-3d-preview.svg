<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0520"/>
      <stop offset="45%" stop-color="#1a0a35"/>
      <stop offset="100%" stop-color="#05101a"/>
    </linearGradient>

    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#251042"/>
      <stop offset="100%" stop-color="#130a26"/>
    </linearGradient>

    <linearGradient id="faceA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#aa1531"/>
    </linearGradient>
    <linearGradient id="faceB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4b2ca2"/>
    </linearGradient>
    <linearGradient id="faceC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0b6273"/>
    </linearGradient>
    <linearGradient id="faceD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#9b5f07"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="cardShadow" x="-40%" y="-40%" width="220%" height="220%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- stage beams -->
  <g opacity="0.28">
    <polygon points="160,-60 225,520 265,520 220,-60" fill="#f43f5e"/>
    <polygon points="510,-60 610,520 648,520 555,-60" fill="#8b5cf6"/>
    <polygon points="940,-60 1005,520 1045,520 995,-60" fill="#06b6d4"/>
    <polygon points="1330,-60 1395,520 1435,520 1390,-60" fill="#f59e0b"/>
  </g>

  <!-- header question card -->
  <g filter="url(#cardShadow)">
    <rect x="250" y="90" width="850" height="160" rx="24" fill="url(#card)" stroke="#8b5cf6" stroke-opacity="0.5"/>
    <text x="290" y="145" fill="#cbb6ff" font-size="26" font-family="Arial, Helvetica, sans-serif" letter-spacing="4">VRAAG 03</text>
    <text x="290" y="200" fill="#ffffff" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">
      Welke artiest hoort bij deze track?
    </text>
  </g>

  <!-- timer ring -->
  <g transform="translate(1220 168)">
    <circle r="76" fill="#120b22" stroke="#3f2a67" stroke-width="10"/>
    <circle r="58" fill="none" stroke="#8b5cf6" stroke-width="12" stroke-linecap="round" stroke-dasharray="280 100"/>
    <circle r="15" fill="#f43f5e" filter="url(#softGlow)"/>
    <text x="0" y="8" fill="#ffffff" font-size="34" text-anchor="middle" font-weight="700" font-family="Arial, Helvetica, sans-serif">12</text>
  </g>

  <!-- 3D answer tiles -->
  <g transform="translate(220 320)">
    <!-- A -->
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="500" height="96" rx="14" fill="url(#faceA)" filter="url(#cardShadow)"/>
      <polygon points="500,0 530,16 530,110 500,96" fill="#7a1026"/>
      <polygon points="0,96 500,96 530,110 30,110" fill="#5c0c1d"/>
      <circle cx="44" cy="48" r="24" fill="#1d0e14" stroke="#ffd8df" stroke-opacity="0.4"/>
      <text x="44" y="56" fill="#ffffff" font-size="24" text-anchor="middle" font-weight="700" font-family="Arial, Helvetica, sans-serif">A</text>
      <text x="92" y="56" fill="#ffffff" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Dua Lipa</text>
    </g>

    <!-- B -->
    <g transform="translate(0 140)">
      <rect x="0" y="0" width="500" height="96" rx="14" fill="url(#faceB)" filter="url(#cardShadow)"/>
      <polygon points="500,0 530,16 530,110 500,96" fill="#32205f"/>
      <polygon points="0,96 500,96 530,110 30,110" fill="#25174a"/>
      <circle cx="44" cy="48" r="24" fill="#140f20" stroke="#ece5ff" stroke-opacity="0.45"/>
      <text x="44" y="56" fill="#ffffff" font-size="24" text-anchor="middle" font-weight="700" font-family="Arial, Helvetica, sans-serif">B</text>
      <text x="92" y="56" fill="#ffffff" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">The Weeknd</text>
    </g>

    <!-- C -->
    <g transform="translate(0 280)">
      <rect x="0" y="0" width="500" height="96" rx="14" fill="url(#faceC)" filter="url(#cardShadow)"/>
      <polygon points="500,0 530,16 530,110 500,96" fill="#084653"/>
      <polygon points="0,96 500,96 530,110 30,110" fill="#063640"/>
      <circle cx="44" cy="48" r="24" fill="#0f1c1f" stroke="#dbf8fc" stroke-opacity="0.45"/>
      <text x="44" y="56" fill="#ffffff" font-size="24" text-anchor="middle" font-weight="700" font-family="Arial, Helvetica, sans-serif">C</text>
      <text x="92" y="56" fill="#ffffff" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Bruno Mars</text>
    </g>

    <!-- D -->
    <g transform="translate(0 420)">
      <rect x="0" y="0" width="500" height="96" rx="14" fill="url(#faceD)" filter="url(#cardShadow)"/>
      <polygon points="500,0 530,16 530,110 500,96" fill="#6f4204"/>
      <polygon points="0,96 500,96 530,110 30,110" fill="#5b3604"/>
      <circle cx="44" cy="48" r="24" fill="#21170c" stroke="#fff1d8" stroke-opacity="0.5"/>
      <text x="44" y="56" fill="#ffffff" font-size="24" text-anchor="middle" font-weight="700" font-family="Arial, Helvetica, sans-serif">D</text>
      <text x="92" y="56" fill="#ffffff" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Ariana Grande</text>
    </g>
  </g>

  <!-- mini leaderboard panel -->
  <g transform="translate(840 350)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="560" height="360" rx="20" fill="#11091f" stroke="#f59e0b" stroke-opacity="0.45"/>
    <text x="34" y="54" fill="#ffd38f" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">LEADERBOARD (3D cards)</text>

    <g transform="translate(32 90)">
      <rect x="0" y="0" width="490" height="72" rx="12" fill="#2f1d08" stroke="#f59e0b"/>
      <text x="24" y="45" fill="#f59e0b" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">1</text>
      <text x="74" y="45" fill="#ffffff" font-size="27" font-family="Arial, Helvetica, sans-serif">Luca</text>
      <text x="450" y="45" text-anchor="end" fill="#ffe6be" font-size="27" font-family="Arial, Helvetica, sans-serif">2840</text>
    </g>
    <g transform="translate(42 176)">
      <rect x="0" y="0" width="472" height="66" rx="12" fill="#1f1633" stroke="#8b5cf6" stroke-opacity="0.6"/>
      <text x="20" y="42" fill="#c8b4ff" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">2</text>
      <text x="64" y="42" fill="#ffffff" font-size="24" font-family="Arial, Helvetica, sans-serif">Mila</text>
      <text x="438" y="42" text-anchor="end" fill="#e6deff" font-size="24" font-family="Arial, Helvetica, sans-serif">2690</text>
    </g>
    <g transform="translate(52 256)">
      <rect x="0" y="0" width="454" height="60" rx="12" fill="#10222c" stroke="#06b6d4" stroke-opacity="0.6"/>
      <text x="18" y="39" fill="#9ae9f8" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">3</text>
      <text x="58" y="39" fill="#ffffff" font-size="22" font-family="Arial, Helvetica, sans-serif">Noah</text>
      <text x="424" y="39" text-anchor="end" fill="#d7f7fc" font-size="22" font-family="Arial, Helvetica, sans-serif">2520</text>
    </g>
  </g>

  <!-- podium bottom -->
  <g transform="translate(1150 760)">
    <polygon points="-250,40 250,40 210,130 -210,130" fill="#0d0b18"/>
    <rect x="-190" y="-20" width="100" height="60" fill="#1f1633" stroke="#8b5cf6"/>
    <rect x="-70" y="-60" width="120" height="100" fill="#2f1d08" stroke="#f59e0b"/>
    <rect x="70" y="0" width="95" height="40" fill="#10222c" stroke="#06b6d4"/>
    <text x="-140" y="18" fill="#c8b4ff" font-size="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">2</text>
    <text x="-10" y="0" fill="#ffd38f" font-size="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">1</text>
    <text x="118" y="26" fill="#9ae9f8" font-size="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">3</text>
  </g>

  <text x="70" y="850" fill="#ffffff" fill-opacity="0.7" font-size="26" font-family="Arial, Helvetica, sans-serif">
    Preview concept: CSS 3D tiles, depth shadows, angled side faces, timed glow ring, and stepped podium hierarchy.
  </text>
</svg>
