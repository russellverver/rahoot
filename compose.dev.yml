services:
  rahoot:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${WEB_PORT:-3000}:3000"
      - "${SOCKET_PORT:-3001}:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/web/node_modules
      - /app/packages/socket/node_modules
      - /app/packages/common/node_modules
    environment:
      - HOSTNAME=0.0.0.0
      - WEB_ORIGIN=${WEB_ORIGIN:-http://localhost:3000}
      - SOCKET_URL=${SOCKET_URL:-http://localhost:3001}
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
